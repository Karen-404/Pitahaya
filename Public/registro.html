<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - Sistema Pitahaya</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
    <div class="logo">SISTEMA PITAHAYA</div>
</nav>

<main class="login-container-registro">
    <h2>Registro de Usuario</h2>

    <form id="registroForm">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" required>
        </div>

        <div class="form-group">
            <label>Correo</label>
            <input type="email" id="correo" required>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="passwordReg" required>
        </div>

        <button type="submit">Registrarse</button>
    </form>

    <p class="reg-link">
        ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
    </p>
</main>

<script src="js/script.js"></script>
</body>
</html>
